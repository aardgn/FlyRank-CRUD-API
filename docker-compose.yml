version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Burada host olarak 'localhost' yerine veritabanı servisinin adı olan 'db' yazıyoruz.
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/taskdb
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskdb
    ports:
      - "5432:5432"
    volumes:
      # Verilerin silinmemesi için kalıcılık (persistence) sağlayan volume
      - pgdata:/var/lib/postgresql/data
      # Tabloyu otomatik oluşturmak için init.sql dosyasını içeri aktarıyoruz
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: